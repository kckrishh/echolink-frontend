<section class="w-full min-h-0 flex justify-center px-3 sm:px-6">
  <main
    class="w-full max-w-5xl bg-bg-panel rounded-2xl border border-border-base overflow-hidden"
  >
    <header
      class="w-full border-b border-border-base flex justify-center px-4 sm:px-6"
    >
      <div
        class="w-full flex flex-col sm:flex-row items-center sm:items-end gap-6 py-6"
      >
        <!-- Avatar -->
        <div
          class="w-28 h-28 sm:w-32 sm:h-32 md:w-40 md:h-40 rounded-2xl bg-input-bg border border-border-base overflow-hidden shrink-0"
        >
          <img [src]="me?.avatar" alt="" class="h-full w-full object-cover" />
        </div>

        <!-- Name/Bio -->
        <div class="flex-1 text-center sm:text-left">
          <h2
            class="text-text-heading font-bold text-3xl sm:text-4xl md:text-5xl leading-tight"
          >
            {{ me?.username }}
          </h2>
          <p class="text-text-secondary pt-2 max-w-xl mx-auto sm:mx-0">
            {{ me?.bio }}
          </p>
        </div>
      </div>
    </header>

    <!-- STATS -->
    <div class="px-4 sm:px-6 py-6">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="text-center">
          <h3 class="text-text-body text-lg font-semibold">Email</h3>
          <p
            class="bg-bg-overlay text-input-text border border-border-base rounded-2xl p-3 mt-2 text-base break-words"
          >
            {{ me?.email }}
          </p>
        </div>

        <div class="text-center">
          <h3 class="text-text-body text-lg font-semibold">Date Joined</h3>
          <p
            class="bg-bg-overlay text-input-text border border-border-base rounded-2xl p-3 mt-2 text-base"
          >
            {{ me?.joinedDate | date: "MMMM d, y" }}
          </p>
        </div>

        <div class="text-center">
          <h3 class="text-text-body text-lg font-semibold">Contacts</h3>
          <p
            class="bg-bg-overlay text-input-text p-3 mt-2 border border-border-base rounded-2xl text-base"
          >
            {{ me?.totalConversations }}
          </p>
        </div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="px-4 sm:px-6 pb-6">
      <div
        class="flex flex-col gap-4 bg-bg-hover rounded-2xl border border-border-base p-4 sm:p-6"
      >
        <!-- CHANGE USERNAME -->
        <article class="w-full">
          <div
            (click)="toggleShowChangeUsername($event)"
            class="px-4 py-3 rounded-xl hover:bg-bg-overlay text-text-body font-medium flex items-center justify-between gap-2 w-full"
          >
            <div class="flex items-center gap-2">
              <lucide-icon name="badge-check" class="w-6 h-6"></lucide-icon>
              <span class="text-base sm:text-lg font-bold"
                >Change Username</span
              >
            </div>
            <lucide-icon
              [name]="showChangeUsername ? 'chevron-up' : 'chevron-down'"
              class="w-4 h-4"
            ></lucide-icon>
          </div>

          <div
            *ngIf="showChangeUsername"
            class="mt-3 w-full sm:max-w-md sm:ml-8 flex flex-col gap-3"
          >
            <div class="flex flex-col gap-1">
              <label class="text-text-muted text-sm">Current Username</label>
              <input
                class="h-11 px-4 rounded-xl bg-input-bg text-input-text border border-input-border"
                [value]="me?.username"
                disabled
              />
            </div>

            <div class="flex flex-col gap-1">
              <label class="text-text-muted text-sm">New Username</label>
              <input
                type="text"
                placeholder="Enter new username"
                class="h-11 px-4 rounded-xl bg-input-bg text-input-text placeholder:text-input-placeholder border border-input-border hover:border-input-hoverBorder focus:border-input-focusBorder focus:ring-1 focus:ring-border-focus outline-none transition"
              />
            </div>

            <div class="flex flex-col gap-1">
              <label class="text-text-muted text-sm"
                >Confirm new Username</label
              >
              <input
                type="text"
                placeholder="Re-enter new username"
                class="h-11 px-4 rounded-xl bg-input-bg text-input-text placeholder:text-input-placeholder border border-input-border hover:border-input-hoverBorder focus:border-input-focusBorder focus:ring-1 focus:ring-border-focus outline-none transition"
              />
            </div>

            <button
              type="button"
              class="px-4 py-2 w-full sm:w-40 mt-1 rounded-lg bg-brand-active hover:bg-brand-hover text-text-onAccent font-medium transition"
            >
              Save Changes
            </button>
          </div>
        </article>

        <!-- CHANGE PASSWORD -->
        <article class="w-full">
          <div
            class="px-4 py-3 rounded-xl hover:bg-bg-overlay text-text-body font-medium flex justify-between items-center gap-2 w-full"
            (click)="toggleShowChangePassword($event)"
          >
            <div class="flex items-center gap-2">
              <lucide-icon name="lock" class="w-6 h-6"></lucide-icon>
              <span class="font-bold text-base sm:text-lg"
                >Change Password</span
              >
            </div>

            <lucide-icon
              [name]="showChangePassword ? 'chevron-up' : 'chevron-down'"
              class="w-4 h-4"
            ></lucide-icon>
          </div>

          <div
            *ngIf="showChangePassword"
            class="mt-3 w-full sm:max-w-md sm:ml-8 flex flex-col gap-3"
          >
            <div class="flex flex-col gap-1">
              <label class="text-text-muted text-sm">Current password</label>
              <input
                type="password"
                placeholder="Enter current password"
                class="h-11 px-4 rounded-xl bg-input-bg text-input-text placeholder:text-input-placeholder border border-input-border hover:border-input-hoverBorder focus:border-input-focusBorder focus:ring-1 focus:ring-border-focus outline-none transition"
              />
            </div>

            <div class="flex flex-col gap-1">
              <label class="text-text-muted text-sm">New password</label>
              <input
                type="password"
                placeholder="Enter new password"
                class="h-11 px-4 rounded-xl bg-input-bg text-input-text placeholder:text-input-placeholder border border-input-border hover:border-input-hoverBorder focus:border-input-focusBorder focus:ring-1 focus:ring-border-focus outline-none transition"
              />
            </div>

            <div class="flex flex-col gap-1">
              <label class="text-text-muted text-sm"
                >Confirm new password</label
              >
              <input
                type="password"
                placeholder="Re-enter new password"
                class="h-11 px-4 rounded-xl bg-input-bg text-input-text placeholder:text-input-placeholder border border-input-border hover:border-input-hoverBorder focus:border-input-focusBorder focus:ring-1 focus:ring-border-focus outline-none transition"
              />
            </div>

            <button
              type="button"
              class="px-4 py-2 w-full sm:w-40 mt-1 rounded-lg bg-brand-active hover:bg-brand-hover text-text-onAccent font-medium transition"
            >
              Save Changes
            </button>
          </div>
        </article>

        <!-- CHANGE AVATAR -->
        <article class="w-full">
          <div
            class="px-4 py-3 rounded-xl hover:bg-bg-overlay text-text-body font-medium flex justify-between items-center gap-2 w-full"
            (click)="showChangeAvatar = !showChangeAvatar"
          >
            <div class="flex items-center gap-2">
              <lucide-icon name="image-plus" class="w-6 h-6"></lucide-icon>
              <span class="font-bold text-base sm:text-lg">Change Avatar</span>
            </div>

            <lucide-icon
              [name]="showChangeAvatar ? 'chevron-up' : 'chevron-down'"
              class="w-4 h-4"
            ></lucide-icon>
          </div>

          <div *ngIf="showChangeAvatar" class="mt-4">
            <div class="flex flex-col lg:flex-row gap-6">
              <div class="lg:w-56 shrink-0">
                <div class="lg:sticky lg:top-4 flex flex-col gap-3">
                  <img
                    *ngIf="selectedAvatar"
                    [src]="
                      getAvatarUrl(selectedAvatar.style, selectedAvatar.seed)
                    "
                    class="h-28 w-28 rounded-2xl border border-border-base bg-bg-overlay object-cover"
                  />

                  <div class="text-sm">
                    <p class="text-text-heading font-semibold">
                      Avatar Preview
                    </p>
                    <p class="text-text-muted leading-snug">
                      This is how other users will see you across EchoLink.
                    </p>
                  </div>

                  <button
                    class="px-4 py-2 rounded-lg bg-brand-active text-text-onAccent hover:bg-brand-hover transition w-full sm:w-40"
                  >
                    Save Changes
                  </button>
                </div>
              </div>

              <div class="flex-1">
                <div
                  class="max-h-[22rem] lg:max-h-[32rem] overflow-y-auto pr-2 flex flex-col gap-6"
                >
                  <div
                    *ngFor="let group of avatarGroups"
                    class="flex flex-col gap-3"
                  >
                    <h4
                      class="text-text-secondary font-semibold text-sm tracking-wide"
                    >
                      {{ group.label }}
                    </h4>

                    <div
                      class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-4 gap-3"
                    >
                      <button
                        *ngFor="let seed of group.seeds"
                        (click)="selectAvatar(group.style, seed)"
                        class="rounded-xl p-2 border transition"
                        [ngClass]="{
                          'border-brand-active bg-bg-hover shadow-echo':
                            selectedAvatar?.style === group.style &&
                            selectedAvatar?.seed === seed,
                          'border-border-base hover:bg-bg-hover': !(
                            selectedAvatar?.style === group.style &&
                            selectedAvatar?.seed === seed
                          ),
                        }"
                      >
                        <img
                          [src]="getAvatarUrl(group.style, seed)"
                          class="h-14 w-14 rounded-lg bg-bg-overlay object-cover"
                        />
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </article>
      </div>
    </div>
  </main>
</section>
